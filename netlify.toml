  status = 301

[[redirects]]
  from = "/hp-printer-service-saskatoon/"
  to   = "/hp-printer-service-saskatoon"
  status = 301

[[redirects]]
  from = "/lexmark-printer-service-saskatoon/"
  to   = "/lexmark-printer-service-saskatoon"
